# Default configuration for GitLab MR AI Reviewer
# This file is for reference only - actual config is loaded from .reviewbot.yml

review:
  # Maximum number of comments to post per MR
  max_comments: 10

  # Language for review comments (e.g., 'en', 'ru', 'zh', 'es')
  language: en

  # Programming languages to review (empty = all)
  languages:
    - python
    - go
    - javascript
    - typescript
    - java
    - cpp
    - c
    - rust

  # Path patterns to ignore
  ignore_paths:
    - migrations/
    - docs/
    - vendor/
    - node_modules/
    - .git/
    - __pycache__/
    - "*.min.js"
    - "*.min.css"

ai:
  # LLM temperature (0.0 = deterministic, 1.0 = creative)
  temperature: 0.3

  # Maximum tokens in response
  max_tokens: 2000

  # Model to use
  model: zai-org/GLM-4.6
