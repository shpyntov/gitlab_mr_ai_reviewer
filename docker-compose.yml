# Docker Compose for local testing of GitLab MR AI Reviewer
# Note: In CI, environment variables are provided by GitLab

version: '3.8'

services:
  reviewbot:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Required: LLM API key
      - LLM_API_KEY=${LLM_API_KEY:-}

      # Required: GitLab token (personal access token with api scope)
      - GITLAB_TOKEN=${GITLAB_TOKEN:-}

      # Required: GitLab project ID
      - GITLAB_PROJECT_ID=${GITLAB_PROJECT_ID:-}

      # Required: Merge request IID
      - GITLAB_MERGE_REQUEST_ID=${GITLAB_MERGE_REQUEST_ID:-}

      # Required: GitLab base URL
      - GITLAB_BASE_URL=${GITLAB_BASE_URL}
      # Optional: Model name
      - LLM_MODEL=${LLM_MODEL:-Qwen/Qwen3-Coder-480B-A35B-Instruct}
      # Optional: Temperature setting
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.3}
      # Optional: Max tokens
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-2000}
      # Optional: Review language
      - REVIEW_LANGUAGE=${REVIEW_LANGUAGE:-ru}
