# Docker Compose for local testing of GitLab MR AI Reviewer
# Note: In CI, environment variables are provided by GitLab

version: '3.8'

services:
  reviewbot:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Required: LLM API key
      - API_KEY=${API_KEY:-}
      
      # Required: GitLab token (personal access token with api scope)
      - GITLAB_TOKEN=${GITLAB_TOKEN:-}
      
      # Required: GitLab project ID
      - CI_PROJECT_ID=${CI_PROJECT_ID:-}
      
      # Required: Merge request IID
      - CI_MERGE_REQUEST_IID=${CI_MERGE_REQUEST_IID:-}
      
      # Optional: GitLab API URL (defaults to gitlab.com)
      - CI_API_V4_URL=${CI_API_V4_URL:-https://gitlab.com/api/v4}
      
      # Optional: Review mode (line or summary)
      - REVIEW_MODE=${REVIEW_MODE:-line}
      # Optional: Default model
      - DEFAULT_MODEL=${DEFAULT_MODEL:-Qwen/Qwen3-Coder-480B-A35B-Instruct}
      # Optional: Override model
      - REVIEW_MODEL=${REVIEW_MODEL:-}
      # Optional: Temperature setting
      - REVIEW_TEMPERATURE=${REVIEW_TEMPERATURE:-0.3}
      # Optional: Max tokens
      - REVIEW_MAX_TOKENS=${REVIEW_MAX_TOKENS:-2000}
      # Optional: Max comments
      - REVIEW_MAX_COMMENTS=${REVIEW_MAX_COMMENTS:-10}
      # Optional: Review language
      - REVIEW_LANGUAGE=${REVIEW_LANGUAGE:-en}
